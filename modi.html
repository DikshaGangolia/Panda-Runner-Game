<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaint Panda Runner Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gameContainer">
        <div class="gameOver">Welcome to Gaint Panda Runner</div>
        <div class="panda" id="panda"></div>
        <div id="scoreCont">Your Score: 0</div>
        <div class="log" id="log"></div>
        <button id="startBtn" style="background-color: red; color: black;">Start Game</button>
        <video id="giftVideo" src="gift.mp4" style="display: none; position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 150px; height: auto; z-index: 5;" muted></video>
    </div>
    <script src="modify.js"></script>
</body>
</html>
